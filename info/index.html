    <h1>お知らせ</h1>
  </section>

  <div id="news-container"></div>

</main>
  
<script src="../assets/js/common.js"></script>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSScinU0ySTH8kf-8pa0rlTDS-7hvP_IaLFvTSFYOg6fNmtbgSG2VMlT1dcgWsgjzDFkbnEku1hmf6i/pub?output=csv";

fetch(sheetURL)
  .then(response => response.text())
  .then(csvText => {
    const rows = csvText.split("\n").slice(1); // 1行目はヘッダーなので除外
    const container = document.getElementById("news-container");

    rows.reverse().forEach(row => {
      if (!row.trim()) return;

      const [date, title, body] = row.split(",");

      const card = document.createElement("div");
      card.className = "info-card";

      card.innerHTML = `
        <button class="info-summary">
          <div class="info-header">
            <span class="info-title">${title}</span>
            <span class="info-date">${date}</span>
          </div>
        </button>
        <div class="info-body">
          <p>${body.replace(/\\n/g, "<br>")}</p>
        </div>
      `;

      container.appendChild(card);
    });
  });
</script>

</body>
